services:
  web:
    build:
      context: ./../openstreetmap-website
    environment:
      PIDFILE: /tmp/pids/server.pid
      INSTANCE_HOST: ${INSTANCE_HOST:-localhost}
    volumes:
      - ./../openstreetmap-website:/app
      - ./start.sh:/docker/start.sh
      - ./scripts:/docker/scripts
      - ./config/settings.local.yml:/app/config/settings.local.yml
      - ./config/database.yml:/app/config/database.yml
      - ./config/storage.yml:/app/config/storage.yml
      - /app/node_modules/
      - web-tmp:/app/tmp
      - web-storage:/app/storage
    networks:
      - local_network
      - osm-proxy
    tmpfs:
      /tmp/pids/
    stdin_open: true
    tty: true
    command: /docker/start.sh
    depends_on:
      - db
      - memcached
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.docker.network=osm-proxy
      - traefik.http.routers.${INSTANCE_NAME:-osmdev}.rule=Host(`${INSTANCE_HOST:-localhost}`)
      - traefik.http.routers.${INSTANCE_NAME:-osmdev}.entrypoints=websecure
      - traefik.http.routers.${INSTANCE_NAME:-osmdev}.tls.certresolver=le
      - traefik.http.services.${INSTANCE_NAME:-osmdev}.loadbalancer.server.port=3000

  memcached:
    image: memcached:latest
    networks:
      - local_network

  db:
    build:
      context: ./../openstreetmap-website
      dockerfile: docker/postgres/Dockerfile
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - local_network

volumes:
  web-tmp:
  web-storage:
  db-data:

networks:
  local_network:
  osm-proxy:
    external: true
