services:
  proxy:
    container_name: proxy
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt
    networks:
      - local_network
    depends_on:
      - web
    command: |
      sh -c 'cat > /etc/nginx/conf.d/default.conf << "CONF"
      server {
          listen 80;
          server_name openstreetmap.204-168-242-139.nip.io;
          location / {
              proxy_pass http://web:3000;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }
      }
      CONF
      nginx -g "daemon off;"'

  web:
    container_name: web
    build:
      context: ./../openstreetmap-website
    environment:
      PIDFILE: /tmp/pids/server.pid
    volumes:
      - ./../openstreetmap-website:/app
      - ./start.sh:/docker/start.sh
      - ./config/settings.local.yml:/app/config/settings.local.yml
      - ./config/database.yml:/app/config/database.yml
      - ./config/storage.yml:/app/config/storage.yml
      - /app/node_modules/
      - web-tmp:/app/tmp
      - web-storage:/app/storage
    networks:
      - local_network
    tmpfs:
      /tmp/pids/
    stdin_open: true
    tty: true
    command: /docker/start.sh
    depends_on:
      - db
      - gps-db
      - memcached
    env_file:
      - .env

  memcached:
    container_name: memcached
    image: memcached:latest
    ports:
      - '11211:11211'
    networks:
      - local_network

  # cgimap:
  #   image: ghcr.io/openstreetmap/cgimap:latest
  #   environment:
  #     CGIMAP_DATABASE: openstreetmap
  #     CGIMAP_HOST: db
  #     CGIMAP_USERNAME: postgres
  #     CGIMAP_PASSWORD: openstreetmap
  #   depends_on:
  #     - db
  #   networks:
  #     - local_network
  #   ports:
  #     - "8000:8000"

  db:
    container_name: db
    build:
      context: ./../openstreetmap-website
      dockerfile: docker/postgres/Dockerfile
    ports:
      - "54321:5432"
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - local_network

  gps-db:
    container_name: gps-db
    image: postgis/postgis:17-3.5
    ports:
      - "54322:5432"
    environment:
      POSTGRES_DB: openstreetmap_gps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: openstreetmap
    volumes:
      - gps-db-data:/var/lib/postgresql/data
    networks:
      - local_network

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@osm.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
      - ./pgpass:/pgpass:ro
    networks:
      - local_network
    depends_on:
      - db
      - gps-db

volumes:
  letsencrypt:
  web-tmp:
  web-storage:
  db-data:
    driver: local
    name: pg_data
  gps-db-data:
    driver: local
    name: gps_pg_data
  pgadmin-data:

networks:
  local_network:
    driver: bridge
